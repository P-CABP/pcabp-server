spring:
  application:
    name: pcabp-server

  datasource:
    url: jdbc:mysql://localhost:3306/pcabp?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: 1q2w3e4r!

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  session:
    timeout: 1800s

  flyway:
    enabled: true
    locations: classpath:migration
    baseline-on-migrate: true
    clean-disabled: false
    clean-on-error: ${FLYWAY_CLEAN_ON_ERROR:true}

  messages:
    basename: messages/label_ko, messages/message_ko, messages/label_en, messages/message_en
    encoding: UTF-8
    fallback-to-system-locale: false
    always-use-message-format: true

server:
  servlet:
    session:
      cookie:
        name: JSESSIONID
        http-only: true
        secure: false
        same-site: lax

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full

app:
  client:
    base-url: http://localhost:3000